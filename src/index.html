<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Belo Pizzas & Massas</title>

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <script
      src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"
      integrity="sha512-v2CJ7UaYy4JwqLDIrZUI/4hqeoQieOmAZNXBeQyjo21dadnwR+8ZaIJVT8EE2iyI61OV8e6M8PP2/4hpQINQ/g=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    ></script>

    <link rel="stylesheet" href="styles/style.css" />
    <link rel="stylesheet" href="styles/header.css" />
    <link rel="stylesheet" href="styles/home.css" />

    <script src="scripts/script.js" defer></script>
  </head>
  <body>
    <header>
      <nav id="navbar">
        <img src="imgs/logo.png" alt="Logo" />

        <ul id="navigationLinks">
          <li class="link">
            <a href="#">Início</a>
          </li>
          <li class="link">
            <a href="#">Cárdapio</a>
          </li>
          <li class="link">
            <a href="#">Avaliações</a>
          </li>
        </ul>

        <button id="defaultButton">Faça seu pedido!</button>

        <button id="hamburguer">
          <i class="fa-solid fa-bars"></i>
        </button>
      </nav>
      <div id="menuMobile">
        <ul id="mobileNavigationLinks">
          <li class="link">
            <a href="#">Início</a>
          </li>
          <li class="link">
            <a href="#">Cárdapio</a>
          </li>
          <li class="link">
            <a href="#">Avaliações</a>
          </li>
        </ul>
        <button id="mobileDefaultButton">Faça seu pedido!</button>
      </div>
    </header>

    <main id="content">
      <section id="home">
        <div id="cta">
          <h1 id="title">O sabor que reúne todo mundo à <span>mesa</span></h1>
          <p id="description">
            Pizzas artesanais, massas preparadas com ingredientes selecionados e
            um atendimento acolhedor para transformar cada refeição em um
            momento especial.
          </p>
          <div id="ctaBtns">
            <a href="#">
              <button id="defaultButton">Ver Cardápio</button>
            </a>
            <a href="tel:+5584986396180">
              <button id="phoneButton">
                <i class="fa-solid fa-phone"></i>
                (84) 9 8639-6180
              </button>
            </a>
          </div>
          <div id="socialMediaButtons">
            <a href="#">
              <i class="fa-brands fa-whatsapp"></i>
            </a>
            <a href="#">
              <i class="fa-brands fa-instagram"></i>
            </a>
            <a href="#">
              <i class="fa-brands fa-facebook"></i>
            </a>
          </div>
        </div>
        <div id="banner">
          <div id="shape"></div>
          <img src="imgs/pizzas.png" alt="Pizzas" />
        </div>
      </section>
    </main>
  </body>
</html>
